<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; }
        .font-serif-cn { font-family: 'Noto Serif SC', serif; }
        .bg-gradient-soft { background: linear-gradient(135deg, #FAF5FF 0%, #FDF2F8 50%, #FDFCF9 100%); }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen">
    <div class="max-w-md mx-auto px-5 py-10">
        <header class="text-center mb-8">
            <h1 class="font-serif-cn text-2xl font-bold text-gray-700 mb-2">二维码生成工具</h1>
            <p class="text-gray-400 text-sm">为你的产品页面生成二维码</p>
        </header>

        <div class="bg-white rounded-2xl p-6 shadow-xl shadow-purple-100/20">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">网站地址</label>
                <input type="url" id="url-input" placeholder="https://yourwebsite.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-100">
                <p class="text-xs text-gray-400 mt-2">小贴士：部署后填入你的实际网址</p>
            </div>

            <button onclick="generateQR()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-xl font-medium text-sm mb-6">生成二维码</button>

            <div id="qrcode-container" class="flex flex-col items-center">
                <div id="qrcode" class="p-4 bg-purple-50 rounded-xl mb-4"></div>
                <button onclick="downloadQR()" id="download-btn" class="hidden px-6 py-2 bg-white border border-purple-200 text-purple-600 rounded-xl text-sm font-medium">下载二维码</button>
            </div>
        </div>

        <div class="mt-8 bg-white/60 backdrop-blur rounded-2xl p-5">
            <h3 class="font-serif-cn font-bold text-gray-700 mb-3">快速使用指南</h3>
            <ol class="text-sm text-gray-600 space-y-2">
                <li>1. 将 <code class="bg-purple-100 px-2 py-0.5 rounded text-purple-600">index.html</code> 上传到你的网站</li>
                <li>2. 在上方填入你的网站地址，点击生成二维码</li>
                <li>3. 下载二维码，印在产品吊牌/包装上</li>
            </ol>
        </div>
    </div>

    <script>
        function generateQR() {
            var url = document.getElementById('url-input').value.trim();
            if (!url) {
                alert('请先填入网站地址');
                return;
            }
            var container = document.getElementById('qrcode');
            container.innerHTML = '';
            new QRCode(container, {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#7C3AED',
                colorLight: '#FAF5FF',
                correctLevel: QRCode.CorrectLevel.M
            });
            document.getElementById('download-btn').classList.remove('hidden');
        }

        function downloadQR() {
            var canvas = document.querySelector('#qrcode canvas');
            if (!canvas) return;
            var link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
